<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - CCB Imperial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { display: flex; height: 100vh; background: #f4f6f9; color: #333; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: #1a1a1a; color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 1.2rem; font-family: 'Georgia', serif; color: #d4af37; border-bottom: 1px solid #333; }
        .menu { list-style: none; padding: 20px 0; flex-grow: 1; }
        .menu li { padding: 15px 20px; cursor: pointer; transition: 0.3s; }
        .menu li:hover, .menu li.active { background: #333; border-left: 4px solid #d4af37; }
        
        /* Main Content */
        .main-content { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h2 { font-weight: 300; }
        .logout { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* Dashboard Cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { font-size: 0.9rem; color: #666; margin-bottom: 10px; text-transform: uppercase; }
        .card .value { font-size: 2rem; font-weight: bold; color: #1a1a1a; }

        /* Editor Section */
        .editor-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-save { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">Admin CCB Imperial</div>
        <ul class="menu">
            <li class="active">Dashboard</li>
            <li>Reservas</li>
            <li>Editar Valores</li>
            <li>Caixa de Entrada (Contatos)</li>
            <li>Configurações</li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Visão Geral</h2>
            <button class="logout">Sair do Sistema</button>
        </header>

        <section class="cards">
            <div class="card">
                <h3>Reservas Hoje</h3>
                <div class="value">12</div>
            </div>
            <div class="card">
                <h3>Ocupação Atual</h3>
                <div class="value">85%</div>
            </div>
            <div class="card">
                <h3>Novas Mensagens</h3>
                <div class="value">5</div>
            </div>
        </section>

        <section class="editor-section">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Editar Valores de Hospedagem</h3>
            <div class="form-group">
                <label>Suíte Executiva (Valor Diária R$)</label>
                <input type="number" value="450.00">
            </div>
            <div class="form-group">
                <label>Suíte Imperial (Valor Diária R$)</label>
                <input type="number" value="890.00">
            </div>
            <button class="btn-save" onclick="alert('Valores atualizados com sucesso!')">Salvar Alterações</button>
        </section>
    </main>

</body>
</html>
